      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.Response'
      summary: Get All Product
      tags:
      - products
  //historyorder/{id}:
    get:
      description: Retrieve a specific order using its ID
