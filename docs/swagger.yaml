basePath: /
definitions:
  models.AddCartRequest:
    properties:
      base_price:
        type: integer
      product_id:
        type: integer
      product_name:
        type: string
      quantity:
        minimum: 1
        type: integer
      size_name:
        type: string
      user_id:
        type: integer
      variant_name:
        type: string
    required:
    - product_id
    - quantity
    - user_id
    type: object
  models.AuthForgotPassword:
    properties:
      email:
        type: string
    required:
    - email
    type: object
  models.AuthLogin:
    properties:
      address:
        type: string
      created_at:
        type: string
      email:
        type: string
      full_name:
        type: string
      id:
        type: integer
      password:
        type: string
      phone:
        type: string
      pictures:
        type: string
      role:
        type: string
    type: object
  models.AuthRegister:
    properties:
      email:
        type: string
      full_name:
        type: string
      password:
        minLength: 6
        type: string
    required:
    - email
    - full_name
    - password
    type: object
  models.Category:
    properties:
      category_id:
        type: integer
      category_name:
        type: string
    type: object
  models.DeleteCartItem:
    properties:
      cart_item_id:
        type: integer
    required:
    - cart_item_id
    type: object
  models.Product:
    properties:
      discount:
        type: integer
      id:
        type: integer
      price:
        type: integer
      product_desc:
        type: string
      product_name:
        type: string
      quantity:
        type: integer
    type: object
  models.Response:
    properties:
      message:
        type: string
      results: {}
      success:
        type: boolean
    type: object
  models.User:
    properties:
      address:
        type: string
      email:
        type: string
      full_name:
        type: string
      id:
        type: integer
      password:
        type: string
      phone:
        type: string
      pictures:
        type: string
    type: object
  models.Users:
    properties:
      address:
        type: string
      email:
        type: string
      full_name:
        type: string
      id:
        type: integer
      phone:
        type: string
      pictures:
        type: string
    type: object
host: localhost:8888
info:
  contact: {}
  description: coffe shop project
  title: Coffee Shop API
  version: 1.0.0
paths:
