name: Server CI/CD
run-name: Build and run latest image on server
on:
    push:
        branches:
            - main
jobs:
    Build-and-Run:
        runs-on: ubuntu-latest
        permissions:
            packages: write
        steps:
            - name: Gathering source code
              uses: actions/checkout@v6
            - name: "[DOCKER] Setup metadata"
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ghcr.io/abipasundan/koda-b6-backend
                  tags: type=raw,value=latest
            - name: "[DOCKER] Login GHCR"
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.repository_owner}}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: "[DOCKER] Set up QEMU"
              uses: docker/setup-qemu-action@v3

            - name: "[DOCKER] Set up Docker Buildx"
              uses: docker/setup-buildx-action@v3

            - name: "[DOCKER] Build and push"
              uses: docker/build-push-action@v6
              with:
                  context: .
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
            - name: "[SERVER] pull image from ghcr.io"
              uses: appleboy/ssh-action@v1
              with:
                  host: ${{ secrets.HOST }} # port 68.183.226.223
                  username: ${{ secrets.USERNAME }} # wildan
                  key: ${{ secrets.KEY }} # private
                  port: ${{ secrets.PORT }} # 22
                  script: |
                      cd server-wildan
                      docker compose pull
                      docker run --rm --network=server-wildan_default migrate/migrate:latest -source github://abipasundan:${{ secrets.GITHUB_TOKEN }}@abipasundan/koda-b6-backend/migrations -database postgresql://postgres:1@pg:5432/postgres?sslmode=disable up
                      docker compose up backend -d





